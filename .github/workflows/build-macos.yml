name: Build on macOS

on:
  push:
    branches:
      - main
      - cmake-test
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v1

    - name: Configure with CMake preset
      run: cmake --preset=macos-x86_64 -DCMAKE_OSX_ARCHITECTURES="x86_64" -DCMAKE_CXX_STANDARD=17 .

    - name: Check architecture
      run: uname -m

    - name: Build project
      run: cmake --build --preset=macos-x86_64Release

  
    - name: Debug Build Output
      run: find . -name '*.dylib'
        
    - name: Package MacOS Release ZIP
      run: |
        mkdir -p Package/UserPlugins
        cp build/libreaper_csurf_integrator.dylib Package/UserPlugins/
        cp -r Scripts Package/
        cp -r CSI Package/
        cd Package
        zip -r ../CSI_MacOS.zip *
      shell: bash

    - name: Upload MacOS Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CSI_MacOS
        path: CSI_MacOS.zip