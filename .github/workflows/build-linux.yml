name: Build on Linux

on:
  push:
    branches:
      - main
      - cmake-test
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install CMake (if not already available)
      run: sudo apt-get update && sudo apt-get install -y cmake

    - name: Configure with CMake preset
      run: cmake --preset=linux64

    - name: Build project
      run: cmake --build --preset=linux64Release